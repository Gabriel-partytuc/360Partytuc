<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Descargas | 360° Party</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 250px; border: 2px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #ffcc00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Acceso a tus videos</h1>
        <p>Ingresa tu clave única:</p>
        <input type="text" id="codigo" placeholder="Ej: EVENTO123">
        <button onclick="buscar()">Ir a mis videos</button>
    </div>

    <script>
        function buscar() {
            const codigo = document.getElementById('codigo').value.toUpperCase();
            // AQUÍ AGREGARÁS LOS CÓDIGOS Y SUS LINKS
            const rutas = {
                "JUAN2026": "https://drive.google.com/drive/folders/TU_LINK_AQUI",
                "MARIA2026": "https://drive.google.com/drive/folders/OTRO_LINK_AQUI"
            };

            if (rutas[codigo]) {
                window.location.href = rutas[codigo];
            } else {
                alert("Código no válido. Por favor intenta de nuevo.");
            }
        }
    </script>
</body>
</html>
