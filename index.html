<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>360° Party</title>
    <style>
        body { 
            background: url('logo.jpg') no-repeat center center fixed; 
            background-size: cover; 
            margin: 0; 
            font-family: sans-serif; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            background: rgba(0,0,0,0.7); 
            padding: 20px; 
            border-radius: 15px; 
            max-width: 900px; 
        }
        .card { 
            background: #1e1e1e; 
            border: 2px solid #ff00ff; 
            padding: 20px; 
            text-align: center; 
            cursor: pointer; 
            border-radius: 10px; 
            font-weight: bold; 
            transition: 0.2s;
        }
        .card:hover { border-color: #ffff00; }
        .highlight { background: #ffff00; color: black; }
        
        /* Modal - Corregido para que aparezca por encima de todo */
        .modal { display: none; position: fixed; z-index: 1000; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); }
        .modal-content { background: #1a1a1a; margin: 5% auto; padding: 30px; width: 80%; max-width: 600px; border: 2px solid #ff00ff; border-radius: 15px; position: relative; }
        .close { cursor:pointer; position: absolute; right: 20px; top: 10px; font-size: 30px; }
    </style>
</head>
<body>

<div class="grid-container">
    <div class="card" onclick="abrir('m1')">PLATAFORMA 360</div>
    <div class="card" onclick="abrir('m2')">CABINA LED</div>
    <div class="card" onclick="abrir('m3')">SELFIE POINT</div>
    <div class="card" onclick="abrir('m4')">VENTILADOR HOLOGRÁFICO</div>
    <div class="card highlight" onclick="abrir('m5')">CONTRATAR</div>
    <div class="card" onclick="abrir('m6')">GRUPO ELECTRÓGENO</div>
    <div class="card" onclick="abrir('m7')">TECNOLOGÍA DE VIDEO</div>
    <div class="card" onclick="abrir('m8')">COMERCIOS AMIGOS</div>
    <div class="card" onclick="abrir('m9')">DESCARGA TU CONTENIDO</div>
</div>

<!-- Modales -->
<div id="m1" class="modal"><div class="modal-content"><span class="close" onclick="cerrar('m1')">&times;</span><h2>Plataforma 360</h2><p>Explicación: Nuestra Plataforma es una de las grandes (1.10 m de diámetro)...</p></div></div>
<div id="m9" class="modal"><div class="modal-content"><span class="close" onclick="cerrar('m9')">&times;</span><h2>Centro de Descargas</h2><input type="text" id="codigoInput" placeholder="Clave única"><button onclick="buscarEvento()">ACCEDER</button></div></div>

<script>
    function abrir(id) { document.getElementById(id).style.display = "block"; }
    function cerrar(id) { document.getElementById(id).style.display = "none"; }
    
    async function buscarEvento() {
        const clave = document.getElementById('codigoInput').value.trim();
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS6QE8rXS-ZvxnU8duyC63A7ukvKlQJzc9bkKpKv1gvZyEhw0G0zAdxxZC2ZrjGwg/pub?gid=982808362&single=true&output=csv';
        try {
            const res = await fetch(url);
            const data = await res.text();
            const filas = data.split('\n');
            for (let i = 1; i < filas.length; i++) {
                let col = filas[i].split(',');
                if (col.length < 2) col = filas[i].split(';');
                if (col[0].trim() === clave) { window.open(col[3].trim(), '_blank'); return; }
            }
            alert("Clave no encontrada");
        } catch(e) { alert("Error de conexión"); }
    }
</script>
</body>
</html>
