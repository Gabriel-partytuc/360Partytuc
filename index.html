<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Party - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grid-container">
    <div class="card">PLATAFORMA 360</div>
    <div class="card">Cabina led + Video Tun</div>
    <div class="card">Selfie point</div>
    
    <div class="card">Ventilador Holografico</div>
    <div class="card highlight">Contratar</div>
    <div class="card">Grupo Electrogeno</div>
    
    <div class="card">Tecnologia de Video</div>
    <div class="card">Comercios Amigos</div>
    <div class="card" onclick="abrirModal()">Descarga tu contenido</div>
</div>

<!-- Modal de Descarga -->
<div id="modalDescarga" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h2>Centro de Descargas 360° Party</h2>
        <input type="text" id="codigoInput" placeholder="Ingresa tu clave única">
        <button onclick="buscarEvento()">ACCEDER</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
