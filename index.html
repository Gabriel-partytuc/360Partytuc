<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Party</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Tu tarjeta de descarga -->
<div class="card" onclick="abrirModal()">
    <h3>Descarga tu contenido</h3>
</div>

<!-- El Modal -->
<div id="modalDescarga" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h2>Centro de Descargas 360° Party</h2>
        <p>Por tu seguridad, tu contenido está protegido. <br>
           Tus videos estarán disponibles durante 90 días en la plataforma y 6 meses en nuestro respaldo local.</p>
        
        <input type="text" id="codigoInput" placeholder="Ingresa tu clave única">
        <button onclick="buscarEvento()">ACCEDER</button>
    </div>
</div>

<!-- AQUÍ VA EL CÓDIGO FUNCIONAL -->
<script>
    function abrirModal() { 
        document.getElementById('modalDescarga').style.display = "block"; 
    }

    function cerrarModal() { 
        document.getElementById('modalDescarga').style.display = "none"; 
    }

    async function buscarEvento() {
        const claveIngresada = document.getElementById('codigoInput').value.trim();
        // --- PEGA AQUÍ TU ENLACE CSV ---
        const urlCSV = 'TU_ENLACE_DE_PUBLICACION_CSV_AQUI'; 
        
        try {
            const respuesta = await fetch(urlCSV);
            const csvTexto = await respuesta.text();
            const filas = csvTexto.split('\n');
            
            let enlaceEncontrado = null;

            for (let i = 1; i < filas.length; i++) {
                const columnas = filas[i].split(',');
                if (columnas[0].trim() === claveIngresada) {
                    enlaceEncontrado = columnas[3]; // Columna 4: Enlace_Drive
                    break;
                }
            }

            if (enlaceEncontrado) {
                window.open(enlaceEncontrado.trim(), '_blank');
            } else {
                alert("Clave no encontrada. Por favor, verifica el código.");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Error al conectar con la base de datos.");
        }
    }
</script>

</body>
</html>
