<<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Party - Gestión Profesional</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #333; padding: 25px; border-radius: 15px; border: 1px solid #444; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #e67e22; }
        .seccion-comercio { background: #222; padding: 40px; margin-top: 50px; border-radius: 20px; border: 1px solid #333; }
        .btn { padding: 12px 25px; background: #e67e22; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; margin-top: 10px; }
        input { padding: 12px; border-radius: 8px; border: none; width: 250px; text-align: center; }
    </style>
</head>
<body>

    <h1>360° Party - Servicios</h1>
    <div class="grid" id="contenedorServicios"></div>

    <div class="seccion-comercio">
        <h2>Acceso Comercios Aliados</h2>
        <input type="text" id="inputClave" placeholder="Ingresa tu clave de acceso">
        <button class="btn" onclick="validarComercio()">Acceder a mi Material</button>
    </div>

    <script>
        const urlServicios = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdDyaQ_-pJlSUU8rVmndJu4tujt6-JQMUqayWOX5TQDdR5bRc5Wbg4Er3DbrlqT9iM1fsiy8EQCfsW/pub?gid=0&single=true&output=csv";
        const urlComercios = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdDyaQ_-pJlSUU8rVmndJu4tujt6-JQMUqayWOX5TQDdR5bRc5Wbg4Er3DbrlqT9iM1fsiy8EQCfsW/pub?gid=579430626&single=true&output=csv";

        // Función para cargar los servicios
        async function cargarServicios() {
            try {
                const res = await fetch(urlServicios);
                const data = await res.text();
                const filas = data.split('\n').slice(1);
                const contenedor = document.getElementById('contenedorServicios');

                filas.forEach(fila => {
                    const col = fila.split(',');
                    if (col.length >= 3) {
                        contenedor.innerHTML += `
                            <div class="card">
                                <h3>${col[0]}</h3>
                                <p>${col[1]}</p>
                                <button class="btn" onclick="window.open('${col[2].trim()}', '_blank')">Más Información</button>
                            </div>`;
                    }
                });
            } catch (err) {
                console.error("Error al cargar servicios:", err);
            }
        }

        // Función para validar comercios
        async function validarComercio() {
            const clave = document.getElementById("inputClave").value;
            const res = await fetch(urlComercios);
            const data = await res.text();
            const filas = data.split('\n');
            
            let encontrado = false;
            filas.forEach(fila => {
                const col = fila.split(',');
                if (col[0] && col[0].trim() === clave.trim()) {
                    window.open(col[4].trim(), '_blank');
                    encontrado = true;
                }
            });
            if (!encontrado) alert("Clave no reconocida. Por favor, intenta de nuevo.");
        }

        cargarServicios();
    </script>
</body>
</html>
